<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" role="img" aria-label="Cedar Grove">
  <!-- Big C -->
  <g transform="translate(2, 2)">
    <text x="0" y="42"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="56"
          font-weight="900"
